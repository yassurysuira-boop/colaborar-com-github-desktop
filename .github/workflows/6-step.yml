name: Step 6 # Review the Pull Request

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: read
  actions: write
  issues: write

env:
  STEP_7_FILE: ".github/steps/7-step.md"

concurrency:
  group: "step-6"
  cancel-in-progress: true

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.7.0
    # Only react to a review on the pull request from the expected branch.
    if: ${{ github.event.pull_request.head.ref == 'add-project-files' }}

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: Check a review was submitted
        id: check-review-submitted
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          review_state: ${{ github.event.review.state }}
        with:
          script: |
            // A submitted review (comment / approved / changes_requested) has a state.
            const state = (process.env.review_state || "").trim();
            if (state.length === 0) {
              throw new Error("No review was submitted on the pull request.");
            }

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 6
            results_table:
              - description: "Enviou uma revisão no pull request"
                passed: ${{ steps.check-review-submitted.outcome == 'success' }}

      # END: Check practical exercise

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      # Prepare the next step: a colleague pushes a NEW file to main so the
      # learner's branch diverges and there is something real to bring in via
      # "Update from main" / "Rebase". We add a brand-new file (not touching
      # the learner's files) so it never conflicts.
      - name: Seed a new commit on main
        run: |
          set -e
          FILE="NOVIDADES-DA-EQUIPE.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout main
          git pull origin main

          # Skip seeding if it was already done (avoid duplicates on re-runs)
          if [ -f "$FILE" ]; then
            echo "Update file already exists, skipping seed."
            exit 0
          fi

          printf '%s\n' \
            '# Novidades da equipe' \
            '' \
            'Um colega adicionou este arquivo à `main` enquanto você trabalhava na sua branch.' \
            'Use **Update from main** ou **Rebase current branch** para trazer esta atualização' \
            'para a sua branch antes de mesclar.' > "$FILE"

          git add "$FILE"
          git commit -m "docs: adiciona arquivo de novidades da equipe"
          git push origin main

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 7

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_7_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 7"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
