name: Step 10 # Tracking Work with Issues

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_11_FILE: ".github/steps/11-step.md"
  CONFLICT_BRANCH: "resolve-this-conflict"

concurrency:
  group: "step-10"
  cancel-in-progress: true

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.7.0

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    # Only react to a brand new issue created by the learner,
    # never the exercise tracking issue or issues opened by the bot.
    if: |
      github.event.issue.number != needs.find_exercise.outputs.issue-number
      && github.event.issue.user.login != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: Check for a descriptive issue
        id: check-for-descriptive-issue
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          issue_title: ${{ github.event.issue.title }}
          issue_body: ${{ github.event.issue.body }}
        with:
          script: |
            // A good issue needs both a title and a description.
            const title = (process.env.issue_title || "").trim();
            const body = (process.env.issue_body || "").trim();

            if (title.length === 0) {
              throw new Error("The issue has no title.");
            }
            if (body.length === 0) {
              throw new Error("The issue has no description.");
            }

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 10
            results_table:
              - description: "Criou uma nova issue com título e descrição"
                passed: ${{ steps.check-for-descriptive-issue.outcome == 'success' }}

      # END: Check practical exercise

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.3

      # Prepare the next step: create a branch that changes the SAME line that we
      # also change on main, so the learner's pull request into main conflicts.
      # We only create the branch and update main here (no PR), because the
      # GITHUB_TOKEN is not allowed to create pull requests.
      - name: Seed a branch that will conflict with main
        run: |
          set -e
          FILE="src/index.html"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Skip seeding if it was already done (avoid duplicates on re-runs)
          if git ls-remote --exit-code --heads origin "$CONFLICT_BRANCH" >/dev/null 2>&1; then
            echo "Conflict branch already exists, skipping seed."
            exit 0
          fi

          git checkout main
          git pull origin main

          # Conflict branch (from main) with one version of the subtitle line.
          git checkout -b "$CONFLICT_BRANCH"
          sed -i 's#<div class="subtitle">.*</div>#<div class="subtitle">Match the bugs before they pile up! 🐛</div>#' "$FILE"
          git commit -am "Propõe um novo texto de subtítulo"
          git push origin "$CONFLICT_BRANCH"

          # A competing change to the SAME line on main, so the pull request conflicts.
          git checkout main
          sed -i 's#<div class="subtitle">.*</div>#<div class="subtitle">Clear the errors to keep the stack stable! 🧱</div>#' "$FILE"
          git commit -am "Atualiza o subtítulo na main"
          git push origin main

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 11

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_11_FILE }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 11"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
